<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Квіз мемів</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Press Start 2P', cursive;
    background-color: #666666;
	background-image: url('24.jpg');
	background-position: center;
	background-size: contain;
	background-repeat: no-repeat;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.app-container {
    width: 420px;
    text-align: center;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}
.hide { display: none; }
.header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
#question-image { max-width: 100%; max-height: 200px; border-radius: 10px; margin-bottom: 15px; object-fit: contain; }
#answers-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.answer-btn {
    width: 30%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(145deg, #4facfe, #00f2fe);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}
.answer-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px #4facfe; }
.correct { background: linear-gradient(145deg, #56ff8f, #2ecc71); box-shadow: 0 0 12px #2ecc71; }
.wrong { background: linear-gradient(145deg, #ff6a6a, #ff2e2e); box-shadow: 0 0 12px #ff2e2e; }
.skip-btn { background: linear-gradient(145deg, #9b59b6, #8e44ad); color: #fff; }
.skip-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px #9b59b6; }
.skip-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
button {
    padding: 12px 18px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 12px;
    border: none;
    background: linear-gradient(145deg, #ffd200, #f7971e);
    color: #000;
    font-weight: bold;
    transition: 0.2s;
}
button:hover { transform: scale(1.05); box-shadow: 0 0 12px #ffd200; }
.switch-theme-button {
    border-radius: 50%;
    padding: 10px;
    background: rgba(255,255,255,0.1);
}
.switch-theme-button:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="app-container">
    <div id="start-screen" class="screen">
        <h1>Квіз мемів</h1>
        <button class="start-btn1" id="start-btn">Почати</button>
    </div>
    <div id="quiz-screen" class="screen hide">
        <div class="header">
            <span id="timer">Час: 15</span>
            <span id="score-display">Бали: 0</span>
        </div>

        <h2 id="question-text"></h2>
        <img id="question-image" class="hide" alt="Question image">
        <div id="answers-container"></div>
        <button id="skip-btn" class="skip-btn">Пропустити питання</button>
    </div>
    <div id="result-screen" class="screen hide">
        <h2>Квіз завершено!</h2>
        <p id="result-text"></p>
        <button id="restart-btn">Спробувати ще</button>
    </div>
</div>

<audio id="timer-sound" src="1581007313_zvuk-chasov.mp3"></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
const questions = [
    { question: "Де ця собака згадується у?", image: "doge.jpg", answers: ["Інстаграмі", "Shiba Inu Token", "Dogecoin", "TikTok"], correct: 2 },
    { question: "Де цей мем з'явився першим?", image: "gigachad.jpg", answers: ["Reddit та 4chan", "YouTube", "TikTok", "Китайські платформи"], correct: 0 },
	{ question: "Цей мем часто використовується для сумних або розчарованих реакцій.", image: "wojak.jpg", answers: ["Wojak", "Success kid", "Pepe", "Trollface"], correct: 0 },
];

const questionText = document.querySelector('#question-text');
const questionImage = document.querySelector('#question-image');
const answersContainer = document.querySelector('#answers-container');
const startScreen = document.querySelector('#start-screen');
const quizScreen = document.querySelector('#quiz-screen');
const resultScreen = document.querySelector('#result-screen');
const startBtn = document.querySelector('#start-btn');
const restartBtn = document.querySelector('#restart-btn');
const scoreDisplay = document.querySelector('#score-display');
const resultText = document.querySelector('#result-text');
const timerElement = document.querySelector('#timer');
const timerSound = document.querySelector('#timer-sound');
const skipBtn = document.querySelector('#skip-btn');

let questionIndex = 0;
let score = 0;
let timer;
let timeLeft = 15;
let currentTheme = "dark";
let skipUsed = false;

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);
skipBtn.addEventListener('click', skipQuestion);

function startGame(){
    startScreen.classList.add('hide');
    resultScreen.classList.add('hide');
    quizScreen.classList.remove('hide');
    score = 0;
    questionIndex = 0;
    skipUsed = false;
    skipBtn.disabled = false;
    scoreDisplay.textContent = "Бали: 0";
    showQuestion(questions[questionIndex]);
}

function showQuestion(question){
    clearInterval(timer);
    timerSound.pause();
    timerSound.currentTime = 0;

    answersContainer.innerHTML = '';
    questionText.textContent = question.question;
    
    // Показываем изображение, если оно есть
    if(question.image){
        questionImage.src = question.image;
        questionImage.classList.remove('hide');
    } else {
        questionImage.classList.add('hide');
    }
    
    startTimer();

    question.answers.forEach((answer,index)=>{
        const button = document.createElement('button');
        button.textContent = answer;
        button.classList.add('answer-btn');
        button.addEventListener('click',()=>checkAnswer(index,button));
        answersContainer.appendChild(button);
    });
}

function checkAnswer(answerIndex, button){
    clearInterval(timer);
    timerSound.pause();
    timerSound.currentTime = 0;

    const correctIndex = questions[questionIndex].correct;
    const buttons = document.querySelectorAll('.answer-btn');
    buttons.forEach(btn=>btn.disabled=true);

    if(answerIndex===correctIndex){
        button.classList.add('correct');
        new Audio("1540308869_jg-032316-sfx-elearning-correct-answer-sound-1.mp3").play();
        score++;
        scoreDisplay.textContent="Бали: "+score;
    } else {
        button.classList.add('wrong');
        buttons[correctIndex].classList.add('correct');
        new Audio("1540308821_zvukovoy-effekt-nepravilnogo-otveta-wrong-buzzer-sound-effect.mp3").play();
    }
    setTimeout(nextQuestion,1000);
}

function nextQuestion(){
    clearInterval(timer);
    timerSound.pause();
    timerSound.currentTime = 0;
    questionIndex++;
    if(questionIndex<questions.length){
        showQuestion(questions[questionIndex]);
    } else {
        showResult();
    }
}

function showResult(){
    clearInterval(timer);
    timerSound.pause();
    timerSound.currentTime = 0;
    quizScreen.classList.add('hide');
    resultScreen.classList.remove('hide');
    let accurancy=Math.round((score/questions.length)*100);
    resultText.textContent=`Твій результат: ${score} з ${questions.length} (${accurancy}%)`;
}

function startTimer(){
    timeLeft=15;
    timerElement.textContent="Час: "+timeLeft;
    timerSound.currentTime=0;
    timerSound.play();
    timer=setInterval(()=>{
        timeLeft--;
        timerElement.textContent="Час: "+timeLeft;
        if(timeLeft<=0){
            clearInterval(timer);
            timerSound.pause();
            timerSound.currentTime=0;
            const wrongSound = new Audio("1540308821_zvukovoy-effekt-nepravilnogo-otveta-wrong-buzzer-sound-effect.mp3");
            wrongSound.play();
            wrongSound.addEventListener('ended', ()=>{
                nextQuestion();
            });
        }
    },1000);
}

function skipQuestion(){
    if(skipUsed) return;
    skipUsed = true;
    skipBtn.disabled = true;
    clearInterval(timer);
    timerSound.pause();
    timerSound.currentTime = 0;
	score++;
	scoreDisplay.textContent="Бали: "+score;
    const skipSound = new Audio("1540308963_jg-032316-sfx-elearning-correct-answer-sound-3.mp3");
    skipSound.play();
    skipSound.addEventListener('ended', ()=>{
        nextQuestion();
    });
}

function switchTheme(){
    const body=document.body;
    const buttons=document.querySelectorAll('.switch-theme-button');
    if(currentTheme==="dark"){
        body.style.color="#333";
        buttons.forEach(btn=>btn.innerHTML="🌛");
        currentTheme="light";
    } else {
        body.style.color="#fff";
        buttons.forEach(btn=>btn.innerHTML="☀️");
        currentTheme="dark";
    }
}

document.querySelectorAll('.switch-theme-button').forEach(button=>{
    button.addEventListener('click',switchTheme);
});
});
</script>
</body>
</html>
